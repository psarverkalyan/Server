<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BM Kalyan Tool</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:20px;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
max-width:500px;
width:100%;
}

h1{
font-size:8vw;
color:#38bdf8;
margin-bottom:10px;
}

.username{
font-size:5vw;
margin-bottom:20px;
}

.timer{
font-size:12vw;
font-weight:bold;
margin:20px 0;
color:#facc15;
word-break:break-word;
}

.warning{
background:#111827;
border:2px solid red;
padding:15px;
border-radius:10px;
color:red;
font-size:5vw;
font-weight:bold;
margin-top:20px;
line-height:1.4;
}

.status{
margin-top:25px;
font-size:5vw;
color:#22c55e;
font-weight:bold;
}

@media(min-width:600px){

h1{
font-size:40px;
}

.username{
font-size:22px;
}

.timer{
font-size:60px;
}

.warning{
font-size:22px;
}

.status{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>BM Kalyan Tool</h1>

<div class="username">
User : <b>Amit Redkar</b>
</div>

<div class="timer" id="timer">
Loading...
</div>

<div class="warning">
❤️ सफलतापूर्वक ❤️ <br><br>
मार्केट के नियमानुसार अमित आपके तरफ से Added Feature पेमेंट ₹10000 और Free Game Update ₹5500 का पेमेंट समयानुसार किया गया<br>
हम आपके पैनल को 8 दिन के अंतराल मे वापस स्वचलित कर देंगे । 
</div>

<div class="status" id="status"></div>

</div>

<script>

let duration = 00 * 05 * 00 * 1000;

if(!localStorage.getItem("panelStart")){
localStorage.setItem("panelStart", Date.now());
}

let startTime = localStorage.getItem("panelStart");

function updateTimer(){

let now = Date.now();
let diff = duration - (now - startTime);

if(diff <= 0){

document.getElementById("timer").innerHTML="00:00:00";

document.getElementById("status").innerHTML=
"👉 Your Panel Is Continued<br>Amit Redkar All IDs Is Relesed. Panal Activate With in 8 days";

return;
}

let hours = Math.floor(diff/(1000*60*60));
let minutes = Math.floor((diff%(1000*60*60))/(1000*60));
let seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("timer").innerHTML=
String(hours).padStart(2,'0') + ":" +
String(minutes).padStart(2,'0') + ":" +
String(seconds).padStart(2,'0');

}

setInterval(updateTimer,1000);

updateTimer();

</script>

</body>
</html>
