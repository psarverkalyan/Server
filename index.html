<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BM kalyan Panal</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff6b35, #ff3c00);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .panel {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #333;
        }

        p {
            font-size: 16px;
            color: #555;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            background: #ffe5e0;
            color: #d60000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h1>BM kalyan Panal</h1>
        <p>Your Panal is Suspend.</p>
        <div class="status">
            Thanks You For Using Services
        </div>
    </div>

</body>
</html>
